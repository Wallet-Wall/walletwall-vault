name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Check formatting
        run: npm run format:check

      - name: Lint contracts
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Smoke-test verifier CLI (npm run verifier:verify)
        run: |
          set -euo pipefail
          out=$(npm run --silent verifier:verify -- \
            --message-file test/fixtures/mldsa/library-generated/message.hex \
            --public-key-file test/fixtures/mldsa/library-generated/public-key.hex \
            --pq-signature-file test/fixtures/mldsa/library-generated/signature.hex \
            --json)
          echo "$out"
          echo "$out" | grep -q '"reason": "ML_DSA_65_VALID"'

      - name: Coverage
        run: npm run coverage

  zkvm-guest:
    name: Compile zkVM guest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Compile guest
        run: cargo check --manifest-path zkvm/guest/Cargo.toml

  zkvm-host-lockfile:
    name: Validate SP1 host Cargo.lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Verify host lockfile is committed and consistent
        # --locked fails if Cargo.lock is missing or out of date with Cargo.toml.
        # No compilation occurs; this only resolves metadata from the lockfile.
        run: cargo metadata --locked --no-deps --manifest-path zkvm/host/Cargo.toml
