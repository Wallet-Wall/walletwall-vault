name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, lint & test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm run security:audit

      - name: Compile contracts
        run: npm run compile

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Check formatting
        run: npm run format:check

      - name: Lint contracts
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Smoke-test shipped CLIs
        run: |
          set -euo pipefail
          # Verifier CLI: verifies a valid fixture triple and prints JSON.
          out=$(npm run --silent verifier:verify -- \
            --message-file test/fixtures/mldsa/library-generated/message.hex \
            --public-key-file test/fixtures/mldsa/library-generated/public-key.hex \
            --pq-signature-file test/fixtures/mldsa/library-generated/signature.hex \
            --json)
          echo "$out"
          echo "$out" | grep -q '"reason": "ML_DSA_65_VALID"'
          # Attestor demo: exercises the off-chain verify + EIP-712 signing path.
          # Both CLIs run under CommonJS ts-node so they work on the pinned Node 20.
          npm run attestor:demo

      - name: SP1 smoke (execute-only journal check; no SP1 toolchain)
        run: |
          set -euo pipefail
          # Cheap, deterministic SP1 lane check: derives the guest journal for a
          # fixture and asserts its shape. No proving; the host execute step is
          # skipped here because CI has no built mldsa65-host binary. Heavy
          # proving / e2e stays gated behind RUN_SP1_E2E=1.
          out=$(npm run --silent sp1:smoke)
          echo "$out"
          echo "$out" | grep -q '"mode": "sp1-smoke"'
          echo "$out" | grep -q '"proven": false'
          echo "$out" | grep -q '"hostExecuted": false'

      - name: Validate reproducible proof artifact (deterministic; no proving)
        run: |
          set -euo pipefail
          # Cheap, deterministic check: the committed proof-artifact manifest is
          # valid and has not drifted from its generator. No SP1 toolchain, no
          # proving, no network. Real proving stays gated behind RUN_SP1_E2E=1.
          npm run proof:artifact:validate

      - name: Validate ML-DSA evidence manifest (deterministic; no proving)
        run: |
          set -euo pipefail
          # Cheap, deterministic check: the committed ML-DSA evidence manifest is
          # valid, its recorded hashes match the artifacts it indexes, and it has
          # not drifted from its generator. No toolchain, no proving, no network.
          npm run validate:evidence

      - name: Validate SP1 proof input (deterministic; no proving)
        run: |
          set -euo pipefail
          # Cheap, deterministic check: the committed SP1 guest proof input is
          # well-formed, aligned with the ML-DSA evidence manifest hashes/schema,
          # and has not drifted. No SP1 toolchain, no proving, no network.
          npm run validate:sp1-input

      - name: Validate ZK verifier adapter boundary (deterministic; no proving)
        run: |
          set -euo pipefail
          # Cheap, deterministic check: the committed ZK verifier adapter is valid,
          # its journal decodes to the proof-input hashes, those hashes match the
          # ML-DSA evidence manifest, and it has not drifted. No SP1 toolchain, no
          # proving, no network.
          npm run validate:zk-adapter

      - name: Validate ZK adapter evidence endpoint response (deterministic; no server)
        run: |
          set -euo pipefail
          # Cheap, deterministic check: the committed read-only endpoint example
          # serves the committed adapter, its etag is keccak256 of that adapter, a
          # conditional GET returns 304, and it has not drifted. No server, no
          # network, no proving.
          npm run validate:zk-response

      - name: Validate static hosted evidence artifact (deterministic; no publish)
        run: |
          set -euo pipefail
          # Cheap, deterministic check: the committed Option A static hosted evidence
          # artifact is byte-for-byte the canonical example, is a valid
          # zk-adapter-evidence-response.v1, its etag is keccak256 of its adapter, it
          # is served from a versioned path, and it has not drifted from the
          # generator. Publishes nothing — no server, no network, no GitHub Pages
          # deploy, no CDN upload, no proving.
          npm run validate:static-artifact

      - name: Coverage
        run: npm run coverage

  zkvm-guest:
    name: Compile zkVM guest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Compile guest
        run: cargo check --manifest-path zkvm/guest/Cargo.toml

  zkvm-host-lockfile:
    name: Validate SP1 host Cargo.lock
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Verify host lockfile is committed and consistent
        # --locked fails if Cargo.lock is missing or out of date with Cargo.toml.
        # No compilation occurs; this only resolves metadata from the lockfile.
        run: cargo metadata --locked --no-deps --manifest-path zkvm/host/Cargo.toml

  evidence-validator:
    name: Check evidence-validator crate (offline)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install stable Rust (with rustfmt)
        # Offline tooling crate: no SP1 toolchain, no prover, and no network/RPC,
        # chain, key, or endpoint behavior at runtime. Cargo fetches only serde +
        # serde_json + sha3 at build time (exactly like the zkvm-guest job). A
        # Cargo.lock IS committed for this crate, so `--locked` is used below for the
        # build/test steps to pin the exact dependency versions and fail on any
        # lockfile drift (mirroring the zkvm-host-lockfile job's reproducibility
        # gate). `cargo fmt` needs no dependency resolution, so it stays unchanged.
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Format check
        run: cargo fmt --check --manifest-path zkvm/evidence-validator/Cargo.toml

      - name: Type / borrow check (no proving, no network) — locked
        run: cargo check --locked --manifest-path zkvm/evidence-validator/Cargo.toml

      - name: Unit + negative tests (no proving, no network/RPC, no chain) — locked
        run: cargo test --locked --manifest-path zkvm/evidence-validator/Cargo.toml
