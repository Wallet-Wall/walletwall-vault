version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-security-and-maintenance:
        # Group only non-breaking updates. Major bumps are excluded so they
        # arrive as separate, individually-reviewable PRs instead of being
        # welded to safe patches (e.g. a Hardhat 2->3 major inside a "security
        # and maintenance" batch, which silently breaks the build).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      # This repo is now ON Hardhat 3 (migrated in the #131 spike). Hardhat's NEXT
      # major (a future Hardhat 4) and the @nomicfoundation/* plugin family are
      # peer-locked together across a major, and such a jump is again an ESM/plugin
      # rewrite risk on a stability-critical public verifier reference — so defer the
      # whole family to ONE dedicated, reviewed migration rather than piecemeal
      # auto-bumps. Minor/patch updates for all of these still flow through the grouped
      # PR above. (chai, hardhat-gas-reporter, and typescript are no longer pinned here:
      # the repo is on chai 6, hardhat-gas-reporter was dropped in the Hardhat 3 migration,
      # and typescript is now on 7 — TS7 works on Hardhat 3 because ts-node is gone and
      # typechain does NOT use the removed classic programmatic compiler API.)
      - dependency-name: "hardhat"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions-security-and-maintenance:
        # Group only non-breaking updates; majors get their own PR (action
        # major bumps can change default runtimes / inputs).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /zkvm/guest
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/host
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/evidence-validator
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
