version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-security-and-maintenance:
        # Group only non-breaking updates. Major bumps are excluded so they
        # arrive as separate, individually-reviewable PRs instead of being
        # welded to safe patches (e.g. a Hardhat 2->3 major inside a "security
        # and maintenance" batch, which silently breaks the build).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      # Hardhat 3 is an ESM/plugin-system rewrite; this repo is a stability-critical
      # public verifier reference. Migrate the whole Hardhat-3 toolchain in ONE
      # dedicated spike PR against the migration guide instead of piecemeal major
      # bumps. The entire @nomicfoundation/* family (hardhat-toolbox, hardhat-ethers,
      # hardhat-network-helpers, hardhat-chai-matchers, hardhat-verify, ignition-core,
      # hardhat-ignition, hardhat-ignition-ethers, …) is peer-locked to Hardhat 3 at
      # its next major, so a wildcard keeps future stragglers out too; `hardhat` core,
      # `hardhat-gas-reporter`, and `chai` (chai 6 is ESM-only, blocked by
      # hardhat-chai-matchers@^2 → chai@^4) round out the set. See #113-#128.
      - dependency-name: "hardhat"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hardhat-gas-reporter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chai"
        update-types: ["version-update:semver-major"]
      # TypeScript 7 is the native (Go) compiler rewrite; it breaks the current
      # hardhat + ts-node toolchain (`Cannot read properties of undefined (reading
      # 'fileExists')` at compile). Its own deliberate migration, not an auto-bump (#125).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions-security-and-maintenance:
        # Group only non-breaking updates; majors get their own PR (action
        # major bumps can change default runtimes / inputs).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /zkvm/guest
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/host
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/evidence-validator
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
