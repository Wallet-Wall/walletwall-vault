version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-security-and-maintenance:
        # Group only non-breaking updates. Major bumps are excluded so they
        # arrive as separate, individually-reviewable PRs instead of being
        # welded to safe patches (e.g. a Hardhat 2->3 major inside a "security
        # and maintenance" batch, which silently breaks the build).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions-security-and-maintenance:
        # Group only non-breaking updates; majors get their own PR (action
        # major bumps can change default runtimes / inputs).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /zkvm/guest
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/host
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/evidence-validator
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
