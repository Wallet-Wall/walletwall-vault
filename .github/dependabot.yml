version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-security-and-maintenance:
        # Group only non-breaking updates. Major bumps are excluded so they
        # arrive as separate, individually-reviewable PRs instead of being
        # welded to safe patches (e.g. a Hardhat 2->3 major inside a "security
        # and maintenance" batch, which silently breaks the build).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"
    ignore:
      # Hardhat 3 is an ESM/plugin-system rewrite; this repo is a stability-critical
      # public verifier reference. Migrate the whole Hardhat-3 toolchain in ONE
      # dedicated spike PR against the migration guide instead of piecemeal major
      # bumps. Every package below is gated on that migration: the Hardhat 3 core
      # rewrite (#113-#116) plus its peer-locked ecosystem — hardhat-toolbox@7 is the
      # Hardhat-3 toolbox ("does not work with Hardhat 2 nor 3" without the migration),
      # and while on toolbox@5 it pins hardhat-chai-matchers@^2 → chai@^4, so
      # toolbox 7 / chai 6 / matchers 3 / verify 3 / ignition-core 3 all fail the build
      # until the whole toolchain moves to Hardhat 3 together (#119-#123).
      - dependency-name: "hardhat"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/hardhat-toolbox"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/hardhat-ethers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/hardhat-network-helpers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "hardhat-gas-reporter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/ignition-core"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/hardhat-chai-matchers"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/hardhat-verify"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chai"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions-security-and-maintenance:
        # Group only non-breaking updates; majors get their own PR (action
        # major bumps can change default runtimes / inputs).
        update-types:
          - "minor"
          - "patch"
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /zkvm/guest
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/host
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/evidence-validator
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
