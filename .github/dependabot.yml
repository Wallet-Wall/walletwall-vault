version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-security-and-maintenance:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions-security-and-maintenance:
        patterns:
          - "*"

  - package-ecosystem: cargo
    directory: /zkvm/guest
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/host
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: cargo
    directory: /zkvm/evidence-validator
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
